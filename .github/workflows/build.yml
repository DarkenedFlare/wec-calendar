name: Build WEC calendar feed

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "generate.py"
  workflow_dispatch: {}   # lets you trigger a manual rebuild from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install -r requirements.txt

      - run: python3 generate.py

      - name: Commit updated feed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rebuild wec.ics"
          file_pattern: docs/wec.ics
